<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shortlink</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-black text-color-white min-h-screen flex items-center justify-center py-8">
<div class="w-full max-w-lg px-4 sm:px-6">
  <h1 class="text-2xl sm:text-3xl font-medium text-center text-white mb-8 font-family">
    by @xqr4d
  </h1>

  <div class="flex flex-col md:flex-row gap-3 mb-8 bg-black">
    <input id="longUrl" type="text" placeholder="Link"
      class="w-full px-4 py-3 text-base sm:text-lg border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
    <button id="shortenBtn"
      class="w-full md:w-auto px-8 py-3 text-base sm:text-lg font-medium text-white bg-yellow-600 rounded-lg hover:bg-red-700 disabled:bg-blue-400 transition">
      Gooo!
    </button>
  </div>

  <p id="error" class="text-white text-center mb-4 hidden"></p>

  <div id="result" class="bg-black p-6 sm:p-8 rounded-xl shadow-sm text-center hidden">
    <p class="text-white mb-2 text-sm sm:text-base">Short link</p>
    <p id="shortUrlDisplay" class="text-lg sm:text-xl font-medium text-white break-all mb-6"></p>

    <div class="flex flex-col sm:flex-row justify-center gap-4 mb-8">
      <button id="copyBtn"
        class="w-full sm:w-auto px-6 py-3 text-white bg-green-600 rounded-lg hover:bg-green-700 transition">
        Copy
      </button>
      <button id="shareBtn"
        class="w-full sm:w-auto px-6 py-3 text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition">
        Share
      </button>
    </div>

    <div class="flex justify-center">
      <div id="qrcode"></div>
    </div>
  </div>
</div>

<style>
    body {
            font-family: 'Unbounded', sans-serif;
        }
</style>

<script>
const longUrlInput = document.getElementById('longUrl');
const shortenBtn = document.getElementById('shortenBtn');
const errorEl = document.getElementById('error');
const resultEl = document.getElementById('result');
const shortUrlDisplay = document.getElementById('shortUrlDisplay');
const copyBtn = document.getElementById('copyBtn');
const shareBtn = document.getElementById('shareBtn');
const qrContainer = document.getElementById('qrcode');

let currentShortUrl = '';

const showError = (msg) => {
  errorEl.textContent = msg;
  errorEl.classList.remove('hidden');
  resultEl.classList.add('hidden');
};

const showResult = (shortUrl) => {
  currentShortUrl = shortUrl;
  shortUrlDisplay.textContent = shortUrl;
  resultEl.classList.remove('hidden');
  errorEl.classList.add('hidden');

  qrContainer.innerHTML = '';
  new QRCode(qrContainer, {
    text: shortUrl,
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff"
  });
};

shortenBtn.onclick = async () => {
  const input = longUrlInput.value.trim();
  if (!input) return showError('Type link');

  let url;
  try {
    url = new URL(input.startsWith('http') ? input : 'https://' + input);
  } catch {
    return showError('Invalid format link');
  }

  shortenBtn.disabled = true;
  shortenBtn.textContent = '...';

  try {
    const response = await fetch(`https://clck.ru/--?url=${encodeURIComponent(url.toString())}`);
    if (!response.ok) throw new Error();
    const text = await response.text();
    const trimmed = text.trim();
    if (trimmed.startsWith('http') && trimmed.includes('clck.ru')) {
      showResult(trimmed);
    } else {
      throw new Error();
    }
  } catch {
    showError('We dont short u link. Try again later.');
  } finally {
    shortenBtn.disabled = false;
    shortenBtn.textContent = 'Gooo!';
  }
};

copyBtn.onclick = () => {
  navigator.clipboard.writeText(currentShortUrl);
  alert('Link success copied!');
};

shareBtn.onclick = () => {
  if (navigator.share) {
    navigator.share({
      title: 'Short link',
      text: 'This short link on my source',
      url: currentShortUrl
    }).catch(() => {});
  } else {
    alert('Function «Share» doesnt support in this browser');
  }
};

longUrlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') shortenBtn.click();
});
</script>
</body>
</html>
